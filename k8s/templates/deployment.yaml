apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: moviecatalog
  name: moviecatalog
  namespace: {{ .Values.namespace }}
spec:
  progressDeadlineSeconds: 600
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: moviecatalog
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: moviecatalog
    spec:
      containers:
      - image: "151634275520.dkr.ecr.us-east-2.amazonaws.com/gitlab-project:{{ .Values.tag }}"
        imagePullPolicy: Always
        name: gitlab-project
        ports:
        - containerPort: {{ .Values.containerPort }}
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30

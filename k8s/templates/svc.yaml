apiVersion: v1
kind: Service
metadata:
  labels:
    app: moviecatalog
  name: moviecatalog-svc
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: 10.100.184.100
  clusterIPs:
  - 10.100.184.100
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: 80-80
    nodePort: 31163
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: moviecatalog
  sessionAffinity: None
  type: NodePort

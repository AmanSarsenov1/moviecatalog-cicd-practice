name: Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      image_tag:
        type: string
        required: true
        description: "Image tag to deploy (must already exist in ECR)"

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: gitlab-project
  EKS_CLUSTER: cicd-practice-cluster

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::151634275520:role/GHA-trust-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster context
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to dev
        run: |
          helm upgrade --install cicd-practice ./k8s \
            -n dev \
            -f k8s/dev-values.yaml \
            --set image.tag=${{ inputs.image_tag }}

  deploy-staging:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::151634275520:role/GHA-trust-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster context
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to staging
        run: |
          helm upgrade --install cicd-practice ./k8s \
            -n staging \
            -f k8s/staging-values.yaml \
            --set image.tag=${{ inputs.image_tag }}

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::151634275520:role/GHA-trust-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set cluster context
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Deploy to prod
        run: |
          helm upgrade --install cicd-practice ./k8s \
            -n prod \
            -f k8s/prod-values.yaml \
            --set image.tag=${{ inputs.image_tag }}